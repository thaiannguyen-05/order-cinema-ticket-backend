name: Docker Build Push Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ vars.IMAGE_NAME || github.repository }}
  CONTAINER_NAME: ${{ vars.CONTAINER_NAME || 'order-cinema-ticket-backend' }}
  APP_PORT: ${{ vars.APP_PORT || '4000' }}
  HOST_PORT: ${{ vars.HOST_PORT || '4000' }}
  ENV_FILE_PATH: ${{ vars.ENV_FILE_PATH || '/opt/order-cinema-ticket-backend/.env.development' }}

jobs:
  quality-gate:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run unit tests
        run: pnpm run test

  build-and-push:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: quality-gate
    outputs:
      image_ref: ${{ steps.out.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: |
          echo "value=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.value }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image output
        id: out
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.value }}:sha-${GITHUB_SHA}"
          echo "image_ref=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: SSH Pull And Run
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          REGISTRY: ${{ env.REGISTRY }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          APP_PORT: ${{ env.APP_PORT }}
          ENV_FILE_PATH: ${{ env.ENV_FILE_PATH }}
          DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          envs: IMAGE_REF,REGISTRY,CONTAINER_NAME,HOST_PORT,APP_PORT,ENV_FILE_PATH,DOCKER_NETWORK,REGISTRY_USERNAME,REGISTRY_PASSWORD
          script: |
            set -euo pipefail

            echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin
            docker pull "$IMAGE_REF"

            docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true

            if [ -n "${DOCKER_NETWORK:-}" ]; then
              docker run -d \
                --name "$CONTAINER_NAME" \
                --restart unless-stopped \
                --network "$DOCKER_NETWORK" \
                -p "$HOST_PORT:$APP_PORT" \
                --env-file "$ENV_FILE_PATH" \
                "$IMAGE_REF"
            else
              docker run -d \
                --name "$CONTAINER_NAME" \
                --restart unless-stopped \
                -p "$HOST_PORT:$APP_PORT" \
                --env-file "$ENV_FILE_PATH" \
                "$IMAGE_REF"
            fi

            docker image prune -f >/dev/null 2>&1 || true
            docker ps --filter "name=$CONTAINER_NAME" --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
